<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <!-- Trachea -->
  <rect x="57" y="2" width="6" height="22" rx="3" fill="url(#trach)" opacity="0.9"/>

  <!-- Left Lung -->
  <path d="M57 22 C57 22 30 28 22 48 C14 68 18 85 28 90 C38 95 48 88 52 80 C56 72 56 55 57 22Z"
    fill="url(#lungL)" opacity="0.92"/>

  <!-- Right Lung -->
  <path d="M63 22 C63 22 90 28 98 48 C106 68 102 85 92 90 C82 95 72 88 68 80 C64 72 64 55 63 22Z"
    fill="url(#lungR)" opacity="0.92"/>

  <!-- Bronchi branches left -->
  <path d="M57 28 C50 32 40 36 35 42" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M57 34 C48 38 38 44 32 52" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M57 40 C50 45 42 52 38 62" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Bronchi branches right -->
  <path d="M63 28 C70 32 80 36 85 42" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M63 34 C72 38 82 44 88 52" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M63 40 C70 45 78 52 82 62" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- PDF files flying up from trachea - small doc icons -->
  <!-- File 1 - center up -->
  <g transform="translate(52, -4) rotate(-8)">
    <rect x="0" y="0" width="9" height="11" rx="1.5" fill="#38bdf8" opacity="0.9"/>
    <path d="M6 0 L9 3 L9 11 L0 11 L0 0Z" fill="none" stroke="white" stroke-width="0.5"/>
    <path d="M6 0 L6 3 L9 3" fill="white" opacity="0.5"/>
    <text x="1.5" y="8.5" font-size="3" fill="white" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- File 2 - left -->
  <g transform="translate(38, -8) rotate(-22)">
    <rect x="0" y="0" width="8" height="10" rx="1.5" fill="#818cf8" opacity="0.85"/>
    <path d="M5.5 0 L8 2.5 L8 10 L0 10 L0 0Z" fill="none" stroke="white" stroke-width="0.5"/>
    <path d="M5.5 0 L5.5 2.5 L8 2.5" fill="white" opacity="0.5"/>
    <text x="1" y="7.5" font-size="2.8" fill="white" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- File 3 - right -->
  <g transform="translate(73, -6) rotate(15)">
    <rect x="0" y="0" width="8" height="10" rx="1.5" fill="#34d399" opacity="0.85"/>
    <path d="M5.5 0 L8 2.5 L8 10 L0 10 L0 0Z" fill="none" stroke="white" stroke-width="0.5"/>
    <path d="M5.5 0 L5.5 2.5 L8 2.5" fill="white" opacity="0.5"/>
    <text x="1" y="7.5" font-size="2.8" fill="white" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- File 4 - far left -->
  <g transform="translate(28, -2) rotate(-35)">
    <rect x="0" y="0" width="7" height="9" rx="1.5" fill="#fb7185" opacity="0.8"/>
    <path d="M5 0 L7 2 L7 9 L0 9 L0 0Z" fill="none" stroke="white" stroke-width="0.5"/>
    <path d="M5 0 L5 2 L7 2" fill="white" opacity="0.5"/>
    <text x="0.5" y="6.5" font-size="2.5" fill="white" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- File 5 - far right -->
  <g transform="translate(84, -1) rotate(30)">
    <rect x="0" y="0" width="7" height="9" rx="1.5" fill="#fbbf24" opacity="0.8"/>
    <path d="M5 0 L7 2 L7 9 L0 9 L0 0Z" fill="none" stroke="white" stroke-width="0.5"/>
    <path d="M5 0 L5 2 L7 2" fill="white" opacity="0.5"/>
    <text x="0.5" y="6.5" font-size="2.5" fill="white" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- Small files inside lungs -->
  <!-- Left lung inner files -->
  <g transform="translate(32, 50) rotate(5)" opacity="0.6">
    <rect x="0" y="0" width="7" height="9" rx="1" fill="white"/>
    <text x="0.5" y="6.5" font-size="2.2" fill="#2563eb" font-weight="bold" font-family="Arial">PDF</text>
  </g>
  <g transform="translate(40, 65) rotate(-10)" opacity="0.5">
    <rect x="0" y="0" width="6" height="8" rx="1" fill="white"/>
    <text x="0.3" y="5.5" font-size="2" fill="#2563eb" font-weight="bold" font-family="Arial">PDF</text>
  </g>
  <!-- Right lung inner files -->
  <g transform="translate(76, 50) rotate(-5)" opacity="0.6">
    <rect x="0" y="0" width="7" height="9" rx="1" fill="white"/>
    <text x="0.5" y="6.5" font-size="2.2" fill="#2563eb" font-weight="bold" font-family="Arial">PDF</text>
  </g>
  <g transform="translate(69, 65) rotate(8)" opacity="0.5">
    <rect x="0" y="0" width="6" height="8" rx="1" fill="white"/>
    <text x="0.3" y="5.5" font-size="2" fill="#2563eb" font-weight="bold" font-family="Arial">PDF</text>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="trach" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lungL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lungR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
</svg>
